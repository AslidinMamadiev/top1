<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3.js MetaMask Smart Contract Interaction</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Web3.js DApp - MetaMask Integration</h1>
        
        <div class="section">
            <h2>📱 MetaMask Connection</h2>
            <button id="connectBtn" class="btn btn-primary">
                <span class="spinner" id="spinner"></span>
                Connect MetaMask
            </button>
            <div id="accountInfo" class="hidden">
                <p><strong>Account:</strong> <span id="account"></span></p>
                <p><strong>Balance:</strong> <span id="balance"></span> ETH</p>
                <p><strong>Network:</strong> <span id="network"></span></p>
            </div>
        </div>

        <div class="section">
            <h2>📋 Smart Contract Configuration</h2>
            <div class="form-group">
                <label for="contractAddress">Contract Address:</label>
                <input type="text" id="contractAddress" placeholder="0x..." value="0x">
            </div>
            <div class="form-group">
                <label for="rpcUrl">RPC URL (Localhost):</label>
                <input type="text" id="rpcUrl" placeholder="http://localhost:8545" value="http://localhost:8545">
            </div>
            <button id="loadContractBtn" class="btn btn-secondary">Load Contract</button>
            <div id="contractStatus" class="status"></div>
        </div>

        <div class="section">
            <h2>📖 View Functions (Read)</h2>
            <div class="form-group">
                <label for="functionName">Select Function:</label>
                <select id="functionName">
                    <option value="">-- Choose a view function --</option>
                    <option value="name">name()</option>
                    <option value="symbol">symbol()</option>
                    <option value="totalSupply">totalSupply()</option>
                    <option value="balanceOf">balanceOf(address)</option>
                </select>
            </div>
            <div class="form-group" id="paramsContainer" style="display:none;">
                <label for="functionParams">Parameter (address):</label>
                <input type="text" id="functionParams" placeholder="0x...">
            </div>
            <button id="callFunctionBtn" class="btn btn-info">Call Function</button>
            <div id="functionResult" class="result"></div>
        </div>

        <div class="section">
            <h2>💰 Send Transaction (Write)</h2>
            <div class="form-group">
                <label for="toAddress">To Address:</label>
                <input type="text" id="toAddress" placeholder="0x...">
            </div>
            <div class="form-group">
                <label for="amount">Amount (in smallest units):</label>
                <input type="text" id="amount" placeholder="1000000000000000000">
            </div>
            <div class="form-group">
                <label for="gasLimit">Gas Limit:</label>
                <input type="number" id="gasLimit" placeholder="100000" value="100000">
            </div>
            <div class="form-group">
                <label for="gasPrice">Gas Price (Gwei):</label>
                <input type="number" id="gasPrice" step="0.1" placeholder="20" value="20">
            </div>
            <button id="sendTxBtn" class="btn btn-success">Send Transaction</button>
            <div id="txResult" class="result"></div>
        </div>

        <div class="section">
            <h2>📝 Logs & Error Messages</h2>
            <div id="logs" class="logs"></div>
            <button id="clearLogs" class="btn btn-danger">Clear Logs</button>
        </div>
    </div>

    <!-- Web3.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3js/4.0.0/index.min.js"></script>
    <!-- Main Application -->
    <script src="main.js"></script>
</body>
</html>
